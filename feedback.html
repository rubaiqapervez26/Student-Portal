<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal - Feedback</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  
  <style>
    /* 1. THEME COLORS & LAYOUT */
    :root {
      --dark-blue: #0d1117;
      --accent-orange: #e8471d;
      --bg-gray: #f0f0f0;
      --gold: #f5c842;
    }

    body {
      background-color: var(--bg-gray);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    .navbar {
      background-color: var(--dark-blue) !important;
      border-bottom: 4px solid var(--accent-orange);
    }

    /* 2. THE BOX EFFECT (Matching your Auth image size) */
    .page-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .main-card {
      background: white;
      width: 100%;
      max-width: 1000px; /* Standardized width across all pages */
      display: flex;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      min-height: 550px;
      overflow: hidden;
    }

    /* 3. PANEL STYLING */
    .left-side {
      background-color: var(--dark-blue);
      color: white;
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right-side {
      flex: 1.2;
      padding: 50px;
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* 4. FORM STYLING */
    .form-control {
      border-radius: 0;
      border: 2px solid #eee;
      padding: 12px;
    }

    .form-control:focus {
      border-color: var(--accent-orange);
      box-shadow: none;
    }

    .btn-submit {
      background-color: var(--accent-orange);
      color: white;
      width: 100%;
      padding: 15px;
      font-weight: bold;
      border: none;
      margin-top: 20px;
      text-transform: uppercase;
    }

    /* SUCCESS MESSAGE */
    #successBox {
      display: none;
      background-color: #d4edda;
      color: #155724;
      padding: 20px;
      border: 1px solid #c3e6cb;
      margin-top: 20px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .main-card { flex-direction: column; }
      .left-side { padding: 30px; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">STUDENT<span style="color:var(--accent-orange)">PORTAL</span></a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="main-card">
    
    <div class="col-md-5 left-side">
      <p style="color: var(--accent-orange); letter-spacing: 2px; font-weight: bold;">FINAL STEP</p>
      <h1 class="display-5 fw-bold">Share Your <br><span style="color: var(--gold);">Thoughts.</span></h1>
      <p class="text-secondary mt-3">Your feedback helps us improve. Tell us about your experience!</p>
      <div id="starsDisplay" class="mt-3" style="font-size: 2.5rem;">⭐⭐⭐⭐⭐</div>
    </div>

    <div class="col-md-7 right-side">
      <div id="formContent">
        <h2 class="fw-bold mb-1">Feedback Form</h2>
        <p class="text-muted mb-4 small">We value your honest opinion.</p>

        <form id="feedbackForm">
          <div class="mb-3">
            <label class="fw-bold small mb-1">YOUR NAME</label>
            <input type="text" id="userName" class="form-control" placeholder="Rubaiqa" required>
          </div>

          <div class="mb-3">
            <label class="fw-bold small mb-1">COMMENTS</label>
            <textarea id="userComments" class="form-control" rows="3" placeholder="How was your experience?" required></textarea>
          </div>

          <div class="mb-3">
            <label class="fw-bold small mb-1">RATING</label>
            <select id="userRating" class="form-control" required>
              <option value="5">5 Stars - Excellent</option>
              <option value="4">4 Stars - Very Good</option>
              <option value="3">3 Stars - Average</option>
              <option value="2">2 Stars - Poor</option>
              <option value="1">1 Star - Very Poor</option>
            </select>
          </div>

          <button type="submit" class="btn-submit">SUBMIT FEEDBACK</button>
        </form>
      </div>

      <div id="successBox">
        <h5>✅ Thank You!</h5>
        <p id="successMessage"></p>
        <a href="dashboard.html" class="btn btn-sm btn-success mt-2">Back to Dashboard</a>
      </div>
    </div>

  </div>
</div>

<script>
  const fbForm = document.getElementById('feedbackForm');

  fbForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('userName').value;
    const rating = document.getElementById('userRating').value;

    // Hide Form and Show Success
    document.getElementById('formContent').style.display = "none";
    document.getElementById('successBox').style.display = "block";
    document.getElementById('successMessage').innerText = 
      "Thanks " + name + "! You gave us a " + rating + " star rating.";
  });

  // Star Display Logic
  document.getElementById('userRating').addEventListener('change', function() {
    const stars = "⭐";
    const count = this.value || 5; 
    document.getElementById('starsDisplay').innerText = stars.repeat(count);
  });
</script>

</body>
</html>
