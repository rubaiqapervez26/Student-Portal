<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal - Dashboard</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  
  <style>
    /* 1. THEME COLORS & LAYOUT */
    :root {
      --dark-blue: #0d1117;
      --accent-orange: #e8471d;
      --bg-gray: #f0f0f0;
      --gold: #f5c842;
    }

    body {
      background-color: var(--bg-gray);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background-color: var(--dark-blue) !important;
      border-bottom: 4px solid var(--accent-orange);
    }

    /* 2. THE BOX EFFECT - Matching your Auth image size exactly */
    .page-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .main-card {
      background: white;
      width: 100%;
      max-width: 1000px; /* Fixed width to match Auth card */
      display: flex;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      min-height: 600px;
      overflow: hidden;
    }

    /* 3. PANEL STYLING */
    .left-side {
      background-color: var(--dark-blue);
      color: white;
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right-side {
      flex: 1.5;
      padding: 40px;
      background-color: white;
      overflow-y: auto;
    }

    /* 4. DASHBOARD COMPONENTS */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #fcfcfc;
      border: 1px solid #eee;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .stat-card:hover {
      border-color: var(--accent-orange);
    }

    .stat-icon { font-size: 1.5rem; margin-bottom: 5px; }

    .table-container {
      border: 1px solid #eee;
    }

    .badge-done { background-color: #198754; color: white; padding: 4px 10px; font-size: 0.75rem; font-weight: bold; }
    .badge-wait { background-color: var(--gold); color: black; padding: 4px 10px; font-size: 0.75rem; font-weight: bold; }

    @media (max-width: 850px) {
      .main-card { flex-direction: column; }
      .stat-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">STUDENT<span style="color:var(--accent-orange)">PORTAL</span></a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="main-card">
    
    <div class="left-side">
      <p style="color: var(--accent-orange); font-weight: bold; letter-spacing: 2px;">UNIVERSITY OF WAH</p>
      <h1 class="display-6 fw-bold">Hello, <br><span id="displayName" style="color: var(--gold);">Student</span>!</h1>
      <p id="displayEmail" class="text-secondary small mb-4">student@uow.edu.pk</p>
      
      <hr style="border-color: rgba(255,255,255,0.1);">
      
      <div class="mt-3">
        <button class="btn btn-sm btn-outline-warning w-100 fw-bold mb-3" onclick="updateTime()">📅 Update Time</button>
        <div id="timeBox" class="text-white-50 small">Click to sync clock</div>
      </div>
    </div>

    <div class="right-side">
      <h4 class="fw-bold mb-4">Academic Overview</h4>
      
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-icon">📚</div>
          <small class="text-muted fw-bold">COURSES</small>
          <h3 id="courseCount" class="mb-0">0</h3>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🏢</div>
          <small class="text-muted fw-bold">DEPT</small>
          <h3 class="mb-0">CY</h3>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎓</div>
          <small class="text-muted fw-bold">TERM</small>
          <h3 class="mb-0">6th</h3>
        </div>
      </div>

      <h5 class="fw-bold mb-3">Portal Activity</h5>
      <div class="table-container">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr class="small">
              <th>TASK</th>
              <th class="text-end">STATUS</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="small fw-bold">Registration</td>
              <td class="text-end"><span class="badge-done">Completed</span></td>
            </tr>
            <tr>
              <td class="small fw-bold">Course Selection</td>
              <td class="text-end"><span id="courseBadge" class="badge-wait">Pending</span></td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <div class="mt-4">
        <a href="courses.html" class="btn btn-dark btn-sm w-100 py-2 fw-bold">MANAGE COURSES</a>
      </div>
    </div>

  </div>
</div>

<script>
  window.onload = function() {
    const savedName = sessionStorage.getItem('username');
    const savedEmail = sessionStorage.getItem('email');

    if (savedName) document.getElementById('displayName').innerText = savedName;
    if (savedEmail) document.getElementById('displayEmail').innerText = savedEmail;
    
    const coursesJSON = sessionStorage.getItem('selectedCourses');
    if (coursesJSON) {
      const courses = JSON.parse(coursesJSON);
      document.getElementById('courseCount').innerText = courses.length;
      document.getElementById('courseBadge').innerText = "Enrolled";
      document.getElementById('courseBadge').className = "badge-done";
    }
  };

  function updateTime() {
    const now = new Date();
    document.getElementById('timeBox').innerText = "Last sync: " + now.toLocaleTimeString();
  }
</script>

</body>
</html>
